<div class="search-container">
  <div class="search-card">
    <h2>მოძებნე რეისი</h2>
    <form [formGroup]="searchForm" (ngSubmit)="onSearch()">
      <div class="form-row">
        <div class="form-group">
          <label for="from">საიდან</label>
          <select id="from" formControlName="fromCity">
            <option value="" disabled selected>აირჩიეთ ქალაქი</option>
            @for (city of cities; track city.id) {
              <option [value]="city.name">{{ city.name }}</option>
            } @empty {
              <option disabled>ქალაქები ვერ მოიძებნა</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="to">სად</label>
          <select id="to" formControlName="toCity">
            <option value="" disabled selected>აირჩიეთ ქალაქი</option>
            @for (city of cities; track city.id) {
              <option [value]="city.name">{{ city.name }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="date">გამგზავრების თარიღი</label>
          <input type="date" id="date" formControlName="travelDate" />
        </div>

        <div class="form-group">
          <label for="tickets">ბილეთების რაოდენობა</label>
          <input type="number" id="tickets" formControlName="ticketCount" min="1" />
        </div>
      </div>

      <button type="submit" class="search-btn" [disabled]="searchForm.invalid">
        მატარებლის მოძებნა
      </button>
    </form>
  </div>
</div>
