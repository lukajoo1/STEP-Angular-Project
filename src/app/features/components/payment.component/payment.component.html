<div class="booking-container">
  <div class="payment-card animate-fade-in">
    @if (!isSuccess) {
      <h2 class="payment-title">ბარათით გადახდა</h2>

      <div class="payment-summary">
        <p class="summary-label">გადასახდელი თანხა:</p>
        <h3 class="summary-amount">{{ totalPrice }} ₾</h3>
      </div>

      <div class="card-form">
        <div class="form-group">
          <label>ბარათის მფლობელი</label>
          <input type="text" placeholder="სახელი გვარი" />
        </div>

        <div class="form-group">
          <label>ბარათის ნომერი</label>
          <input type="text" placeholder="0000 0000 0000 0000" maxlength="16" />
        </div>

        <div class="card-row">
          <div class="form-group">
            <label>ვადა</label>
            <input type="text" placeholder="MM/YY" maxlength="5" />
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="password" placeholder="***" maxlength="3" />
          </div>
        </div>

        <button class="btn-pay" (click)="confirmPayment()" [disabled]="isProcessing">
          {{ isProcessing ? 'მუშავდება...' : 'გადახდის დადასტურება' }}
        </button>
      </div>
    }

    @if (isSuccess) {
      <div class="success-block">
        <div class="success-icon">✔</div>
        <h2 class="success-title">გადახდა წარმატებულია!</h2>
        <p class="success-subtitle">ბილეთები გამოგზავნილია თქვენს მეილზე.</p>

        <button class="btn-download" (click)="downloadTicket()">🎫 ბილეთის PDF გადმოწერა</button>

        <button class="btn-home" (click)="goHome()">მთავარზე დაბრუნება</button>
      </div>
    }
  </div>
</div>
